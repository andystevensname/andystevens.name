name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: docker
    container:
      image: node:22-bookworm
    env:
      # Static site → Bunny Storage (S3-compatible).
      AWS_ACCESS_KEY_ID: ${{ secrets.BUNNY_S3_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.BUNNY_S3_WRITE_TOKEN }}
      AWS_DEFAULT_REGION: us-east-1  # required by awscli; Bunny accepts any value
      BUNNY_S3_ENDPOINT: ${{ secrets.BUNNY_S3_ENDPOINT }}
      # Post-deploy triggers still hit Netlify Functions during Stage A.
      AP_DOMAIN: ${{ secrets.AP_DOMAIN }}
      AP_DELIVER_SECRET: ${{ secrets.AP_DELIVER_SECRET }}
      PUSH_FANOUT_SECRET: ${{ secrets.PUSH_FANOUT_SECRET }}
      GO_JAMMING_TOKEN: ${{ secrets.GO_JAMMING_TOKEN }}
      BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
      BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Install awscli
        run: apt-get update && apt-get install -y --no-install-recommends awscli

      - name: Deploy to Bunny Storage
        run: |
          aws s3 sync dist/ "s3://andystevens-name/" \
            --endpoint-url "$BUNNY_S3_ENDPOINT" \
            --delete \
            --no-progress

      - name: Send webmentions
        if: success()
        continue-on-error: true
        run: node scripts/send-webmentions.mjs

      - name: Deliver to Bluesky
        if: success()
        continue-on-error: true
        run: node scripts/deliver-to-bluesky.mjs

      - name: Deliver to ActivityPub
        if: success()
        continue-on-error: true
        run: node scripts/deliver-to-activitypub.mjs

      - name: Send push notifications
        if: success()
        continue-on-error: true
        run: node scripts/send-push-notifications.mjs
