name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: docker
    container:
      image: node:24-bookworm
    env:
      # Static site → Bunny Storage via the official SDK.
      BUNNY_S3_BUCKET_NAME: ${{ secrets.BUNNY_S3_BUCKET_NAME }}
      # Bunny's native API uses the same credential pool as S3-compatible
      # access — reuse the write token here.
      BUNNY_STORAGE_ACCESS_KEY: ${{ secrets.BUNNY_S3_WRITE_TOKEN }}
      BUNNY_STORAGE_REGION: ${{ vars.BUNNY_STORAGE_REGION }}
      # ActivityPub config — used both by build-time static actor/webfinger
      # generation (scripts/generate-static-ap.mjs) and by runner-side
      # outbound triggers (deliver-to-activitypub).
      AP_DOMAIN: ${{ secrets.AP_DOMAIN }}
      AP_USERNAME: ${{ secrets.AP_USERNAME }}
      AP_PUBLIC_KEY: ${{ secrets.AP_PUBLIC_KEY }}
      AP_PRIVATE_KEY: ${{ secrets.AP_PRIVATE_KEY }}
      AP_DISPLAY_NAME: ${{ secrets.AP_DISPLAY_NAME }}
      AP_SUMMARY: ${{ secrets.AP_SUMMARY }}
      AP_ICON_URL: ${{ secrets.AP_ICON_URL }}
      # Subdomain that hosts the dynamic AP endpoints; inboxUrl/outboxUrl/
      # followersUrl in the generated actor JSON point here.
      AP_DYNAMIC_BASE: ${{ vars.AP_DYNAMIC_BASE }}
      AP_DELIVER_SECRET: ${{ secrets.AP_DELIVER_SECRET }}
      GO_JAMMING_TOKEN: ${{ secrets.GO_JAMMING_TOKEN }}
      BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
      BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
      # Inlined into the Astro build (PUBLIC_* prefix) so Preferences.astro
      # knows where to POST push subscribe/unsubscribe requests.
      PUBLIC_AP_BASE: ${{ vars.AP_DYNAMIC_BASE }}
      # Push fanout runs in the runner; needs state-bucket access for
      # listing subscriptions, plus the full VAPID keypair.
      # BUCKET_NAME + ACCESS_KEY are SECRETS; REGION is a VAR. Forgejo keeps the
      # namespaces separate — BUCKET_NAME was previously read from `vars.` and
      # silently yielded empty, failing runner-side state calls with
      # "BUNNY_STATE_* must be set".
      BUNNY_STATE_BUCKET_NAME: ${{ secrets.BUNNY_STATE_BUCKET_NAME }}
      BUNNY_STATE_ACCESS_KEY: ${{ secrets.BUNNY_STATE_ACCESS_KEY }}
      BUNNY_STATE_REGION: ${{ vars.BUNNY_STATE_REGION }}
      VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
      VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
      # Inlined into the Astro build via the envPrefix config in astro.config.mjs;
      # also used by push-send.mjs at runtime.
      VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
      # Bunny Edge Script deploy.
      BUNNY_API_KEY: ${{ secrets.BUNNY_API_KEY }}
      BUNNY_EDGE_SCRIPT_ID: ${{ vars.BUNNY_EDGE_SCRIPT_ID }}
      # Gemini capsule: built into a container image and pushed to
      # Docker Hub. Bunny Magic Containers only integrates with Docker
      # Hub / GHCR, not arbitrary registries, so Codeberg was a no-go.
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
      GEMINI_IMAGE: ${{ vars.GEMINI_IMAGE }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache npm deps
        uses: actions/cache@v4
        with:
          # Both the installed tree (so npm ci has nothing to do on a
          # hit) and npm's own tarball cache (so even a miss is faster).
          path: |
            node_modules
            ~/.npm
          # package-lock.json drives invalidation: any add/remove/upgrade
          # changes its hash. Including node version so a future Node
          # bump doesn't reuse stale native modules. Bump the v1 prefix
          # to force-bust the cache wholesale if it ever gets corrupted.
          key: v1-npm-node24-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            v1-npm-node24-
            v1-npm-

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Generate gemini capsule
        run: node scripts/generate-gemtext.mjs

      - name: Deploy to Bunny Storage
        run: node scripts/deploy-to-bunny.mjs

      - name: Deploy Edge Script
        run: node scripts/deploy-edge-script.mjs

      - name: Install docker CLI
        run: apt-get update && apt-get install -y --no-install-recommends docker.io

      - name: Build and push gemini container image
        env:
          # The runner's dind sidecar; reachable from job containers on
          # the shared forgejo network.
          # DOCKER_HOST: 
          AGATE_BASE_IMAGE: ${{ vars.AGATE_BASE_IMAGE }}
        run: |
          echo "$DOCKER_TOKEN" | docker login docker.io -u "$DOCKER_USERNAME" --password-stdin
          # Bunny Magic Containers runs on amd64 hosts; the runner is
          # arm64 (Apple Silicon). Force amd64 explicitly so the pushed
          # image matches the deploy target. OrbStack's binfmt handles
          # the cross-build, but most of the heavy lifting (compiling
          # agate) lives in the pre-built AGATE_BASE_IMAGE — this build
          # is just COPY content + a couple of layers.
          docker build \
            --platform linux/amd64 \
            --build-arg AGATE_BASE_IMAGE="$AGATE_BASE_IMAGE" \
            -f gemini-server/Dockerfile \
            -t "$GEMINI_IMAGE:latest" \
            -t "$GEMINI_IMAGE:$GITHUB_SHA" \
            .
          docker push "$GEMINI_IMAGE:latest"
          docker push "$GEMINI_IMAGE:$GITHUB_SHA"

      # Magic Containers pulls the image only on (re)deploy, not when a new tag
      # is pushed — so trigger a rolling update to the image we just pushed.
      # Pinned to the per-commit SHA tag (not :latest) so the reference always
      # changes and the pull actually happens. Skipped until GEMINI_MC_APP_ID /
      # GEMINI_MC_CONTAINER are set, so it can't break builds before it's
      # configured. api_key reuses the account BUNNY_API_KEY (this action does
      # not support sub-user keys).
      - name: Redeploy gemini capsule (Bunny Magic Containers)
        if: success() && vars.GEMINI_MC_APP_ID != ''
        uses: https://github.com/BunnyWay/actions/container-update-image@main
        with:
          api_key: ${{ secrets.BUNNY_API_KEY }}
          app_id: ${{ vars.GEMINI_MC_APP_ID }}
          container: ${{ vars.GEMINI_MC_CONTAINER }}
          image_tag: ${{ github.sha }}

      - name: Send webmentions
        if: success()
        continue-on-error: true
        run: node scripts/send-webmentions.mjs

      - name: Deliver to Bluesky
        if: success()
        continue-on-error: true
        run: node scripts/deliver-to-bluesky.mjs

      - name: Deliver to ActivityPub
        if: success()
        continue-on-error: true
        run: node scripts/deliver-to-activitypub.mjs

      - name: Send push notifications
        if: success()
        continue-on-error: true
        run: node scripts/send-push-notifications.mjs
