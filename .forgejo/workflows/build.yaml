name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: docker
    container:
      image: node:22-bookworm
    env:
      # Static site → Bunny Storage via the official SDK.
      BUNNY_S3_BUCKET_NAME: ${{ secrets.BUNNY_S3_BUCKET_NAME }}
      # Bunny's native API uses the same credential pool as S3-compatible
      # access — reuse the write token here.
      BUNNY_STORAGE_ACCESS_KEY: ${{ secrets.BUNNY_S3_WRITE_TOKEN }}
      BUNNY_STORAGE_REGION: ${{ vars.BUNNY_STORAGE_REGION }}
      # Post-deploy triggers still hit Netlify Functions during Stage A.
      AP_DOMAIN: ${{ secrets.AP_DOMAIN }}
      AP_DELIVER_SECRET: ${{ secrets.AP_DELIVER_SECRET }}
      PUSH_FANOUT_SECRET: ${{ secrets.PUSH_FANOUT_SECRET }}
      GO_JAMMING_TOKEN: ${{ secrets.GO_JAMMING_TOKEN }}
      BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
      BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Debug — curl PUT from runner using the secret
        run: |
          echo "BUNNY_STORAGE_ACCESS_KEY length: ${#BUNNY_STORAGE_ACCESS_KEY}"
          printf '%s' "$BUNNY_STORAGE_ACCESS_KEY" | sha1sum | awk '{print "key sha1:", $1}'
          echo "BUNNY_S3_BUCKET_NAME length: ${#BUNNY_S3_BUCKET_NAME}"
          printf '%s' "$BUNNY_S3_BUCKET_NAME" | sha1sum | awk '{print "bucket sha1:", $1}'
          echo "runner-test" > /tmp/runner-curl-test.txt
          curl -sS -o /tmp/curl-body -w "HTTP %{http_code}\n" -X PUT \
            -H "AccessKey: $BUNNY_STORAGE_ACCESS_KEY" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@/tmp/runner-curl-test.txt" \
            "https://ny.storage.bunnycdn.com/$BUNNY_S3_BUCKET_NAME/runner-curl-test.txt"
          echo "--- response body ---"
          cat /tmp/curl-body || true
          echo

      - name: Deploy to Bunny Storage
        run: node scripts/deploy-to-bunny.mjs

      - name: Send webmentions
        if: success()
        continue-on-error: true
        run: node scripts/send-webmentions.mjs

      - name: Deliver to Bluesky
        if: success()
        continue-on-error: true
        run: node scripts/deliver-to-bluesky.mjs

      - name: Deliver to ActivityPub
        if: success()
        continue-on-error: true
        run: node scripts/deliver-to-activitypub.mjs

      - name: Send push notifications
        if: success()
        continue-on-error: true
        run: node scripts/send-push-notifications.mjs
