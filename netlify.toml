[build]
  command = "npm run build"
  publish = "dist"

[[plugins]]
  package = "./netlify/plugins/send-webmentions"

[[plugins]]
  package = "./netlify/plugins/post-to-bluesky"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/feed"
  to = "/feed.xml"
  status = 301

[[redirects]]
  from = "/index.xml"
  to = "/feed.xml"
  status = 301

[[redirects]]
  from = "/feed/index.xml"
  to = "/feed.xml"
  status = 301

[[redirects]]
  from = "/blog/*"
  to = "/articles/:splat"
  status = 301

[[redirects]]
  from = "/blog"
  to = "/articles/"
  status = 301

[[redirects]]
  from = "/.well-known/host-meta*"
  to = "https://fed.brid.gy/.well-known/host-meta:splat"
  status = 302
  
[[redirects]]
  from = "/.well-known/webfinger*"
  to = "https://fed.brid.gy/.well-known/webfinger"
  status = 302